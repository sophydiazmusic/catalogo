<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thania - Catálogo Premium</title>
    <!-- RUTA ABSOLUTA RELATIVA PARA GITHUB -->
    <link rel="stylesheet" href="./static/style.css">
</head>

<body>
    <div class="container">
        <header>
            <h1>Thania</h1>
            <p>Panel de Control - Catálogo Automático</p>
        </header>

        <main>
            <section class="controls">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="🔍 Buscar marca o modelo (ej. Jordan)...">
                </div>
                <div class="filter-group" id="brandFilters">
                </div>
                <div class="main-buttons">
                    <button id="refreshBtn" class="btn premium">Sincronizar Datos</button>
                    <a href="/api/download" id="downloadBtn" class="btn secondary">Descargar PDF</a>
                </div>
            </section>

            <section id="status" class="status-msg"></section>

            <section class="catalog-header">
                <h2>Catálogo Premium</h2>
                <p>Lo último en Zapatillas Urbanas</p>
            </section>

            <div id="catalogGrid" class="catalog-grid">
                <p style="text-align: center;">Cargando catálogo...</p>
            </div>
        </main>
    </div>
    <!-- RUTA ABSOLUTA RELATIVA PARA GITHUB -->
    <script src="./static/script.js"></script>
</body>

</html>
